

<!DOCTYPE html>
<html lang="pt-br" x-data="appStore()" :class="darkMode ? 'dark' : ''">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TaskFlow{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- SortableJS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    .toast-enter { animation: slideIn .3s ease; }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>

<body class="font-inter min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900
             dark:from-gray-950 dark:via-gray-900 dark:to-gray-950
             text-white transition-colors duration-300">

  <!-- ── NAVBAR ── -->
  <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/5 border-b border-white/10 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">

      <!-- Logo -->
      <a href="{% url 'tarefas:home' %}" class="flex items-center gap-2 font-bold text-xl">
        <i data-lucide="zap" class="text-indigo-400 w-6 h-6"></i>
        TaskFlow
      </a>

      <!-- Links -->
      <div class="hidden md:flex items-center gap-6">
        <a href="{% url 'tarefas:home' %}"
           class="flex items-center gap-1.5 text-slate-300 hover:text-white transition">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
        </a>
        <a href="{% url 'tarefas:kanban' %}"
           class="flex items-center gap-1.5 text-slate-300 hover:text-white transition">
          <i data-lucide="columns" class="w-4 h-4"></i> Kanban
        </a>
        <a href="{% url 'tarefas:adicionar' %}"
           class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl font-semibold transition">
          <i data-lucide="plus" class="w-4 h-4"></i> Nova Tarefa
        </a>
      </div>

      <!-- Dark mode toggle -->
      <button @click="darkMode = !darkMode"
              class="p-2 rounded-xl bg-white/10 hover:bg-white/20 transition">
        <i data-lucide="sun"  class="w-5 h-5" x-show="darkMode"></i>
        <i data-lucide="moon" class="w-5 h-5" x-show="!darkMode"></i>
      </button>
    </div>
  </nav>

  <!-- ── TOAST AREA ── -->
  <div id="toast-area"
       class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"
       aria-live="polite"></div>

  <!-- ── MAIN ── -->
  <main class="max-w-7xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  <script>
    
    function appStore() {
      return {
        darkMode: localStorage.getItem('darkMode') === 'true',
        init() {
          this.$watch('darkMode', v => localStorage.setItem('darkMode', v));
        }
      }
    }

    
    function showToast(msg, type = 'success') {
      const colors = {
        success: 'bg-green-500',
        error:   'bg-red-500',
        info:    'bg-indigo-500',
      };
      const area = document.getElementById('toast-area');
      const el   = document.createElement('div');
      el.className = `toast-enter flex items-center gap-2 px-5 py-3 rounded-xl text-white font-medium shadow-lg ${colors[type]}`;
      el.innerHTML = msg;
      area.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
    document.body.addEventListener('htmx:configRequest', e => {
      e.detail.headers['X-CSRFToken'] = getCookie('csrftoken');
    });

    function getCookie(name) {
      return document.cookie.split(';').map(c => c.trim())
        .find(c => c.startsWith(name + '='))?.split('=')[1] ?? '';
    }

    // Init Lucide icons após cada swap HTMX
    document.addEventListener('htmx:afterSwap', () => lucide.createIcons());
    document.addEventListener('DOMContentLoaded',  () => lucide.createIcons());
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
