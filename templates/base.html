<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}TaskFlow{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            background:
            radial-gradient(circle at top left,#6a11cb 0%,transparent 30%),
            radial-gradient(circle at bottom right,#2575fc 0%,transparent 30%),
            #0f172a;

            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px;
        }

        .container{
            width:100%;
            max-width:1200px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:28px;

            padding:40px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.3);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
            font-weight:700;
        }

        .subtitle{
            color:#cbd5e1;
            margin-bottom:40px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:30px;
        }

        .btn{
            padding:14px 24px;
            border:none;
            border-radius:14px;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            color:white;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            text-decoration:none;

            display:inline-flex;
            align-items:center;
            gap:10px;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(37,99,235,0.3);
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:20px;
        }

        thead{
            background:rgba(255,255,255,0.08);
        }

        th{
            padding:20px;
            text-align:left;
            font-size:14px;
            text-transform:uppercase;
            letter-spacing:1px;
            color:#94a3b8;
        }

        td{
            padding:22px 20px;
            border-top:1px solid rgba(255,255,255,0.05);
        }

        tbody tr{
            transition:0.3s;
        }

        tbody tr:hover{
            background:rgba(255,255,255,0.05);
        }

        .status{
            padding:8px 14px;
            border-radius:999px;
            font-size:13px;
            font-weight:600;
        }

        .complete{
            background:rgba(34,197,94,0.15);
            color:#4ade80;
        }

        .pending{
            background:rgba(239,68,68,0.15);
            color:#f87171;
        }

        .actions{
            display:flex;
            gap:12px;
        }

        .action-btn{
            text-decoration:none;
            padding:10px 16px;
            border-radius:12px;
            font-size:14px;
            font-weight:600;
            transition:0.3s;
        }

        .edit{
            background:rgba(59,130,246,0.15);
            color:#60a5fa;
        }

        .delete{
            background:rgba(239,68,68,0.15);
            color:#f87171;
        }

        .action-btn:hover{
            transform:scale(1.05);
        }

        form{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:16px;

            border-radius:16px;

            border:1px solid rgba(255,255,255,0.1);

            background:rgba(255,255,255,0.05);

            color:white;

            font-size:16px;

            outline:none;

            transition:0.3s;
        }

        input:focus,
        textarea:focus{
            border-color:#3b82f6;
            box-shadow:0 0 0 4px rgba(59,130,246,0.2);
        }

        textarea{
            min-height:140px;
            resize:none;
        }

        .form-title{
            margin-bottom:30px;
        }

        .submit-btn{
            margin-top:10px;
        }

        @media(max-width:768px){

            .container{
                padding:25px;
            }

            .topbar{
                flex-direction:column;
                gap:20px;
                align-items:flex-start;
            }

            table{
                display:block;
                overflow-x:auto;
            }

            h1{
                font-size:32px;
            }
        }

    </style>

</head>
<body>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
