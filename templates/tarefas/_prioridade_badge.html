{% if tarefa.prioridade == "urgente" %}
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold
             bg-red-500/15 text-red-400 border border-red-500/20">
  <i data-lucide="flame" class="w-3 h-3"></i> Urgente
</span>

{% elif tarefa.prioridade == "alta" %}
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold
             bg-orange-500/15 text-orange-400 border border-orange-500/20">
  <i data-lucide="arrow-up" class="w-3 h-3"></i> Alta
</span>

{% elif tarefa.prioridade == "media" %}
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold
             bg-indigo-500/15 text-indigo-400 border border-indigo-500/20">
  <i data-lucide="minus" class="w-3 h-3"></i> Média
</span>

{% else %}
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold
             bg-slate-500/15 text-slate-400 border border-slate-500/20">
  <i data-lucide="arrow-down" class="w-3 h-3"></i> Baixa
</span>
{% endif %}
